<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kinabase Bridge Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="card__header">
          <h1>Kinabase Bridge</h1>
          <p>Control the data sync between InfluxDB and Kinabase.</p>
        </header>
        <div class="card__body">
          <div class="status-line" id="status-line">
            <div class="status__indicator" id="bridge-indicator"></div>
            <div>
              <h2 id="bridge-status">Loading…</h2>
              <p id="status-detail" class="status__detail"></p>
            </div>
          </div>
          <button id="toggle-button" class="toggle-button" disabled>
            Loading…
          </button>
        </div>
        <footer class="card__footer">
          <div class="meta" id="last-success">Last sync: –</div>
          <div class="meta" id="last-timestamp">Last processed data: –</div>
        </footer>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
